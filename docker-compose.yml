services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: kitchen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/kitchen
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: ${JWT_SECRET:-ZINEk7BUcq6EJnLejhN6yg81eIJRfkNA2bqb7gzbitb}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
